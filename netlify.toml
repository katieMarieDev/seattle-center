[[redirects]]
  from = "/discovery/*"
  to = "https://app.ticketmaster.com/discovery/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/eventbrite/*"
  to = "https://www.eventbriteapi.com/v3/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  command = "npm run build"
  publish = "dist"
